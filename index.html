<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Design Exhibition</title>
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <div>
                <h1>Service Design Exhibition</h1>
                <p>A showcase of innovative projects from the Service Design class.</p>
            </div>
            <button id="theme-toggle" type="button" aria-label="Toggle color mode">Dark Mode</button>
        </div>
    </header>

    <main id="project-gallery">
    </main>

    <div id="project-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modal-title"></h2>
            <img id="modal-image" src="" alt="">
            <p id="modal-description"></p>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 Service Design Class</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
